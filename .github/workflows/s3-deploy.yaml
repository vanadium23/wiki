# Deploy Quartz site to S3-compatible storage (AWS S3, MinIO, DigitalOcean Spaces, Backblaze B2, etc.)
#
# Required GitHub Secrets:
#   S3_ENDPOINT     - Custom endpoint URL (optional for AWS S3; required for MinIO, DO Spaces, B2, etc.)
#   S3_REGION       - Region (e.g. us-east-1, nyc3)
#   S3_BUCKET       - Bucket name
#   S3_ACCESS_KEY_ID    - Access key
#   S3_SECRET_ACCESS_KEY - Secret key
#
# Sync uses --delete to remove remote files that no longer exist locally.
name: Deploy to S3

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Quartz
        run: npx quartz build

      - name: Configure AWS CLI for S3-compatible storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.S3_REGION }}
        run: |
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set default.region "$AWS_DEFAULT_REGION"

      - name: Sync to S3 (with delete-removed)
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          if [ -n "$S3_ENDPOINT" ]; then
            aws s3 sync ./public s3://$S3_BUCKET/ --endpoint-url "$S3_ENDPOINT" --delete --no-progress
          else
            aws s3 sync ./public s3://$S3_BUCKET/ --delete --no-progress
          fi
