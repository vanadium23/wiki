services:
  builder:
    build: .
    working_dir: /usr/src/app
    volumes:
      - ./content:/usr/src/app/content
      - public_data:/usr/src/app/public_output
    command: npx quartz build --watch -d public_output/site
    healthcheck:
      test: ["CMD", "test", "-f", "/usr/src/app/public_output/site/index.html"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 30s

  nginx:
    image: nginx:alpine
    networks:
      - ingress
    volumes:
      - public_data:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      builder:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wiki.rule=Host(`chernov.wiki`)"
      - "traefik.http.routers.wiki.entrypoints=websecure"
      - "traefik.http.routers.wiki.tls=true"
      - "traefik.http.routers.wiki.tls.certresolver=letsencrypt"

volumes:
  public_data:

networks:
  ingress:
    external: true
